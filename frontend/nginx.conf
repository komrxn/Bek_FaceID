server {
    listen 80;
    server_name _;

    # SPA — fall back to index.html so React Router can resolve paths.
    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed assets aggressively.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy /api/* and /static/* to the backend container on the compose network.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        # Generous body for multipart frames (HD JPEG ~200 KB; cap at 8 MB).
        client_max_body_size 8m;
        proxy_read_timeout 60s;
    }

    location /static/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # index.html — НИКОГДА не кэшируется. Иначе после деплоя клиенты бы
    # держали старый HTML с указанием на устаревшие hashed-бандлы.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
